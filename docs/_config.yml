title: "👀🐝Ⓜ️ DEWR Agentic AI Bootcamp"
description: "A hands-on bootcamp on building AI agents with IBM watsonx - from no-code to pro-code solutions"
baseurl: "/DEWRAgenticAIBootcamp"
url: "https://monadil.github.io"

# Build settings
markdown: kramdown
theme: just-the-docs

# Just the Docs theme configuration
color_scheme: nil
search_enabled: true

# Navigation structure
nav_sort: case_insensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Footer content
footer_content: "Copyright &copy; 2026 IBM Client Engineering. Distributed under the MIT License."

# Aux links for the upper right navigation
aux_links:
  "Course on GitHub":
    - "https://github.com/Monadil/DEWRAgenticAIBootcamp"

# Makes Aux links open in a new tab
aux_links_new_tab: true

# Enable heading anchors
heading_anchors: true

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .gitignore
